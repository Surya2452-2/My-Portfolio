<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Polupalli Surya Narayana</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --primary: #4f46e5;
      --secondary: #1f2937;
      --radius: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: white;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
      animation: fadeInDown 1s ease forwards;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 25px;
      animation: fadeInUp 1.2s ease forwards;
    }

    .social-icons {
      display: flex;
      gap: 25px;
      justify-content: center;
      margin-top: 15px;
      animation: fadeInUp 1.4s ease forwards;
    }

    .social-icons a {
      color: white;
      font-size: 2rem;
      transition: transform 0.3s ease, color 0.3s ease;
    }

    .social-icons a:hover {
      transform: scale(1.2);
      color: #f1f1f1;
    }

    footer {
      position: absolute;
      bottom: 15px;
      width: 100%;
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.9rem;
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <h1>Let's Connect 🤝</h1>
  <p>Feel free to reach out for collaborations or just a friendly chat!</p>

  <div class="social-icons">
    <a href="https://linkedin.com/in/surya-polupalli5b794025a" target="_blank" aria-label="LinkedIn">
      <i class="fab fa-linkedin"></i>
    </a>
    <a href="https://github.com/Surya2452-2" target="_blank" aria-label="GitHub">
      <i class="fab fa-github"></i>
    </a>
    <a href="https://www.instagram.com/_one.and.only_surya_/" target="_blank" aria-label="Instagram">
      <i class="fab fa-instagram"></i>
    </a>
  </div>

  <footer>
    © 2025 Polupalli Surya Narayana — All Rights Reserved
  </footer>

</body>
</html>
